<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 콘텐츠 통합 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f8; color: #333; }
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="min-h-screen antialiased">
    
    <nav class="bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-xl bg-[#03c75a] text-white flex items-center justify-center font-bold text-lg">N</div>
            <h1 class="text-xl font-bold text-gray-800">도서 콘텐츠 관리자</h1>
        </div>
        <a href="/logout" class="text-sm text-gray-500 font-medium bg-gray-50 hover:bg-gray-100 px-4 py-2 rounded-full transition-colors">로그아웃</a>
    </nav>

    <div class="max-w-7xl mx-auto p-6 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-2">
        
        <div class="lg:col-span-4 space-y-6">
            
            <div class="bg-white p-7 rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-gray-50">
                <h2 class="text-lg font-bold mb-5 text-gray-800">1. 도서 검색</h2>
                <div class="space-y-4">
                    <input type="text" id="isbnInput" placeholder="ISBN 13자리 입력" class="w-full bg-gray-50 border-transparent p-4 rounded-2xl focus:bg-white focus:border-[#03c75a] focus:ring-2 focus:ring-green-100 transition-all text-gray-800 placeholder-gray-400 outline-none">
                    <div class="flex gap-2">
                        <button onclick="fetchBook()" class="flex-1 bg-[#f0fdf4] text-[#03c75a] py-3.5 rounded-2xl hover:bg-[#dcfce7] transition-colors text-sm font-bold">새로 불러오기</button>
                        <button onclick="searchHistory()" class="flex-1 bg-gray-100 text-gray-600 py-3.5 rounded-2xl hover:bg-gray-200 transition-colors text-sm font-bold">기존 DB 찾기</button>
                    </div>
                </div>
            </div>

            <div id="bookDetail" class="hidden bg-white p-7 rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-[#03c75a]/20 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[#03c75a] to-[#2bdc7c]"></div>
                <div class="flex items-center gap-2 mb-2 mt-1">
                    <span class="flex w-2 h-2 bg-[#03c75a] rounded-full"></span>
                    <h2 class="text-sm text-[#03c75a] font-bold">도서 확인됨</h2>
                </div>
                <h3 id="bookTitle" class="text-xl font-bold text-gray-800 leading-snug mt-1"></h3>
                <p id="bookMeta" class="text-sm text-gray-500 mt-2"></p>
                <div id="dbBadge" class="hidden mt-4 inline-flex bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1.5 rounded-full">DB 기록 있음</div>
            </div>

            <div class="bg-white p-7 rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-gray-50">
                <h2 class="text-lg font-bold mb-5 text-gray-800">2. 생성 옵션</h2>
                <div class="space-y-3 mb-6">
                    <label class="flex items-center p-4 border border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" id="chk_smartstore" value="smartstore" class="w-5 h-5 accent-[#03c75a] rounded focus:ring-0 cursor-pointer" checked>
                        <span class="ml-3 text-gray-700 font-medium">스마트스토어 상세페이지</span>
                    </label>
                    <label class="flex items-center p-4 border border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" id="chk_blog" value="blog" class="w-5 h-5 accent-[#03c75a] rounded focus:ring-0 cursor-pointer" checked>
                        <span class="ml-3 text-gray-700 font-medium">블로그 리뷰글</span>
                    </label>
                    <label class="flex items-center p-4 border border-gray-100 rounded-2xl cursor-pointer hover:bg-gray-50 transition-colors">
                        <input type="checkbox" id="chk_cafe" value="cafe" class="w-5 h-5 accent-[#03c75a] rounded focus:ring-0 cursor-pointer" checked>
                        <span class="ml-3 text-gray-700 font-medium">카페 추천글</span>
                    </label>
                </div>
                <button onclick="generateSelected()" class="w-full bg-[#03c75a] text-white px-6 py-4 rounded-2xl font-bold hover:bg-[#02b351] hover:-translate-y-0.5 transition-all shadow-md shadow-green-200/50 text-base">콘텐츠 자동 생성</button>
            </div>

        </div>

        <div class="lg:col-span-8 flex flex-col h-full space-y-6">
            
            <div class="bg-white p-7 rounded-[2rem] shadow-[0_8px_30px_rgba(0,0,0,0.03)] border border-gray-50 flex flex-col h-full">
                
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold text-gray-800">3. 결과물 확인</h2>
                    <button onclick="copyContent()" class="bg-gray-800 text-white px-5 py-2.5 rounded-full text-sm hover:bg-gray-700 transition-colors font-medium flex items-center gap-2 shadow-sm">
                        복사하기
                    </button>
                </div>
                
                <div class="bg-gray-100 p-1.5 rounded-2xl flex space-x-1 mb-6">
                    <button id="tab-smartstore" onclick="showTab('smartstore')" class="flex-1 py-3 rounded-xl bg-white shadow-sm text-[#03c75a] font-bold text-sm transition-all">스마트스토어</button>
                    <button id="tab-blog" onclick="showTab('blog')" class="flex-1 py-3 rounded-xl text-gray-500 hover:text-gray-700 hover:bg-gray-50 font-medium text-sm transition-all">블로그</button>
                    <button id="tab-cafe" onclick="showTab('cafe')" class="flex-1 py-3 rounded-xl text-gray-500 hover:text-gray-700 hover:bg-gray-50 font-medium text-sm transition-all">카페</button>
                </div>

                <div class="flex-grow">
                    <textarea id="contentResult" class="w-full h-[550px] p-6 bg-gray-50 border-none rounded-2xl text-gray-700 text-sm focus:ring-2 focus:ring-[#03c75a]/20 transition-all resize-none leading-relaxed outline-none" readonly>좌측에서 도서를 검색하고 생성 버튼을 눌러주세요.</textarea>
                </div>
            </div>
            
        </div>

    </div>

    <script>
        let currentBook = null;
        let results = { smartstore: '', blog: '', cafe: '' };
        let activeTab = 'smartstore';

        async function fetchBook() {
            const isbn = document.getElementById('isbnInput').value.trim();
            if (!isbn) return alert("ISBN을 입력해주세요.");
            
            document.getElementById('contentResult').value = "도서 정보를 불러오는 중입니다...";
            
            const res = await fetch('/fetch_book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({isbn})
            });
            const result = await res.json();
            
            if (result.success) {
                currentBook = result.data;
                currentBook.isbn = isbn;
                displayBookInfo(currentBook);
                
                results = { smartstore: '', blog: '', cafe: '' };
                document.getElementById('dbBadge').classList.add('hidden');
                document.getElementById('contentResult').value = "도서 확인 완료. [콘텐츠 자동 생성] 버튼을 눌러주세요.";
            } else {
                alert(result.message);
                document.getElementById('contentResult').value = "결과가 없습니다.";
            }
        }

        async function searchHistory() {
            const isbn = document.getElementById('isbnInput').value.trim();
            if (!isbn) return alert("검색할 ISBN을 입력해주세요.");

            document.getElementById('contentResult').value = "DB에서 기록을 검색 중입니다...";

            const res = await fetch(`/search_history?isbn=${isbn}`);
            const result = await res.json();

            if (result.success) {
                results = { smartstore: '', blog: '', cafe: '' };
                Object.assign(results, result.data);
                
                document.getElementById('bookDetail').classList.remove('hidden');
                document.getElementById('bookTitle').innerText = "DB 기록 불러옴";
                document.getElementById('bookMeta').innerText = `ISBN: ${isbn}`;
                document.getElementById('dbBadge').classList.remove('hidden');
                
                currentBook = { isbn: isbn };

                showTab(activeTab);
            } else {
                alert(result.message);
                document.getElementById('contentResult').value = "DB에 해당 ISBN의 기록이 없습니다.";
            }
        }

        function displayBookInfo(book) {
            document.getElementById('bookDetail').classList.remove('hidden');
            document.getElementById('bookTitle').innerText = book.title;
            document.getElementById('bookMeta').innerText = `${book.author} | ${book.publisher}`;
        }

        async function generateSelected() {
            if (!currentBook) return alert("먼저 도서정보를 불러오거나 검색해주세요.");
            
            const targets = [];
            if(document.getElementById('chk_smartstore').checked) targets.push('smartstore');
            if(document.getElementById('chk_blog').checked) targets.push('blog');
            if(document.getElementById('chk_cafe').checked) targets.push('cafe');

            if(targets.length === 0) return alert("생성할 채널을 하나 이상 선택해주세요.");

            document.getElementById('contentResult').value = "AI가 콘텐츠를 작성 중입니다... \n(선택한 채널 수에 따라 시간이 걸릴 수 있습니다)";
            
            for (const target of targets) {
                try {
                    const res = await fetch('/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({book_info: currentBook, target: target})
                    });
                    const result = await res.json();
                    results[target] = result.content;
                } catch (e) {
                    results[target] = "생성 중 오류가 발생했습니다.";
                }
            }
            
            showTab(targets[0]);
        }

        // 알약(Pill) 스타일 탭 전환 애니메이션
        function showTab(target) {
            activeTab = target;
            document.getElementById('contentResult').value = results[target] || "아직 이 채널에 대해 생성된 내용이 없습니다.";
            
            const tabs = ['smartstore', 'blog', 'cafe'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === target) {
                    el.className = `flex-1 py-3 rounded-xl bg-white shadow-sm text-[#03c75a] font-bold text-sm transition-all`;
                } else {
                    el.className = `flex-1 py-3 rounded-xl text-gray-500 hover:text-gray-700 hover:bg-gray-50 font-medium text-sm transition-all`;
                }
            });
        }

        function copyContent() {
            const content = document.getElementById('contentResult').value;
            if (content && !content.includes("결과가 여기에 표시됩니다") && !content.includes("생성된 내용이 없습니다") && !content.includes("AI가 콘텐츠를")) {
                navigator.clipboard.writeText(content).then(() => {
                    alert("성공적으로 복사되었습니다!");
                }).catch(err => {
                    alert("복사 기능이 지원되지 않는 브라우저입니다.");
                });
            } else {
                alert("복사할 내용이 없습니다.");
            }
        }
    </script>
</body>
</html>
