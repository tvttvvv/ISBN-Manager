<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 콘텐츠 통합 관리자</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css)">
    <link href="[https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap](https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap)" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f6f8; color: #333; margin: 0; }
        
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* 사이드바 메뉴 활성화 효과 */
        .menu-active { background-color: #1e232b; border-left: 4px solid #00c6ff; color: #ffffff !important; }
        .menu-item { border-left: 4px solid transparent; }
    </style>
</head>
<body class="h-screen flex overflow-hidden antialiased">
    
    <aside class="w-[240px] bg-[#2b303b] text-[#9ca3af] flex flex-col flex-shrink-0 z-20 shadow-xl">
        <div class="h-16 flex items-center px-6 border-b border-[#3b414f] mb-4">
            <i class="fa-solid fa-book-open text-white mr-3"></i>
            <h1 class="text-white font-bold text-lg tracking-wide">콘텐츠 툴킷</h1>
        </div>

        <nav class="flex-1 overflow-y-auto px-0 space-y-1">
            <div class="px-6 py-3 text-xs font-bold uppercase tracking-wider text-[#6b7280]">작업 관리</div>
            
            <a href="#" onclick="switchPage('generate', this)" class="menu-item menu-active flex items-center px-6 py-3.5 hover:bg-[#1e232b] hover:text-white transition-colors cursor-pointer text-sm">
                <i class="fa-solid fa-pen-to-square w-6"></i>
                <span>콘텐츠 생성</span>
            </a>
            
            <a href="#" onclick="switchPage('history', this)" class="menu-item flex items-center px-6 py-3.5 hover:bg-[#1e232b] hover:text-white transition-colors cursor-pointer text-sm">
                <i class="fa-solid fa-chart-line w-6"></i>
                <span>DB 기록 (모니터링)</span>
            </a>

            <div class="px-6 py-3 mt-4 text-xs font-bold uppercase tracking-wider text-[#6b7280]">환경 설정</div>
            
            <a href="#" onclick="switchPage('settings', this)" class="menu-item flex items-center px-6 py-3.5 hover:bg-[#1e232b] hover:text-white transition-colors cursor-pointer text-sm">
                <i class="fa-solid fa-key w-6"></i>
                <span>암호 변경</span>
            </a>
            
            <a href="/logout" class="menu-item flex items-center px-6 py-3.5 hover:bg-[#1e232b] hover:text-white transition-colors cursor-pointer text-sm mt-auto">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i>
                <span>로그아웃</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-[#3b414f] text-xs text-center text-[#6b7280]">
            Admin: {{ username }}
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-hidden bg-[#f4f6f9]">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center px-8 shadow-sm flex-shrink-0 z-10">
            <h2 id="pageTitle" class="text-xl font-bold text-[#00c6ff]">스마트 도서 콘텐츠 생성</h2>
        </header>

        <div class="flex-1 overflow-y-auto p-8 relative">

            <div id="page-generate" class="page-section grid grid-cols-1 lg:grid-cols-12 gap-6 h-full">
                <div class="lg:col-span-4 flex flex-col gap-6">
                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-5">
                        <h3 class="text-sm font-bold text-gray-700 mb-3"><i class="fa-solid fa-magnifying-glass mr-2"></i>도서 정보 불러오기</h3>
                        <div class="flex gap-2">
                            <input type="text" id="isbnInput" placeholder="ISBN 입력 (13자리)" class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#00c6ff] focus:outline-none focus:ring-1 focus:ring-[#00c6ff]">
                            <button onclick="fetchBook()" class="bg-[#2b303b] text-white px-4 py-2 rounded text-sm hover:bg-[#1f232b] font-bold"><i class="fa-solid fa-download"></i></button>
                        </div>
                        
                        <div id="bookDetail" class="hidden mt-4 p-4 bg-gray-50 border border-gray-200 rounded">
                            <span class="inline-block bg-[#00c6ff] text-white text-[10px] font-bold px-2 py-0.5 rounded mb-1">확인됨</span>
                            <h4 id="bookTitle" class="font-bold text-gray-800 text-sm leading-tight"></h4>
                            <p id="bookMeta" class="text-xs text-gray-500 mt-1"></p>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-5 flex-1">
                        <h3 class="text-sm font-bold text-gray-700 mb-4"><i class="fa-solid fa-layer-group mr-2"></i>생성 채널 선택</h3>
                        <div class="space-y-2 mb-6">
                            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded cursor-pointer hover:bg-gray-50">
                                <input type="checkbox" id="chk_smartstore" value="smartstore" class="w-4 h-4 text-[#00c6ff]" checked>
                                <span class="text-sm font-medium text-gray-700">스마트스토어 상세페이지</span>
                            </label>
                            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded cursor-pointer hover:bg-gray-50">
                                <input type="checkbox" id="chk_blog" value="blog" class="w-4 h-4 text-[#00c6ff]" checked>
                                <span class="text-sm font-medium text-gray-700">네이버 블로그 리뷰글</span>
                            </label>
                            <label class="flex items-center space-x-3 p-3 border border-gray-200 rounded cursor-pointer hover:bg-gray-50">
                                <input type="checkbox" id="chk_cafe" value="cafe" class="w-4 h-4 text-[#00c6ff]" checked>
                                <span class="text-sm font-medium text-gray-700">네이버 카페 추천글</span>
                            </label>
                        </div>
                        <button onclick="generateSelected()" class="w-full bg-[#00c6ff] text-white px-4 py-3 rounded font-bold hover:bg-[#00b0e6] transition shadow text-sm">
                            <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>콘텐츠 일괄 생성
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-8 bg-white rounded-lg border border-gray-200 shadow-sm flex flex-col h-full overflow-hidden">
                    <div class="flex border-b border-gray-200 bg-gray-50">
                        <button id="tab-smartstore" onclick="showTab('smartstore')" class="flex-1 py-3 text-sm font-bold border-b-2 border-[#00c6ff] text-[#00c6ff] bg-white">스마트스토어</button>
                        <button id="tab-blog" onclick="showTab('blog')" class="flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100">블로그</button>
                        <button id="tab-cafe" onclick="showTab('cafe')" class="flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100">카페</button>
                    </div>
                    <div class="p-2 border-b border-gray-100 flex justify-end bg-white">
                        <button onclick="copyContent()" class="border border-gray-300 text-gray-700 bg-white px-3 py-1.5 rounded text-xs hover:bg-gray-50 font-bold shadow-sm">
                            <i class="fa-regular fa-copy mr-1"></i>현재 탭 복사
                        </button>
                    </div>
                    <div class="flex-1 p-0 relative">
                        <textarea id="contentResult" class="absolute inset-0 w-full h-full p-5 border-none resize-none text-sm text-gray-700 leading-relaxed focus:outline-none" readonly>왼쪽에서 도서를 검색하고 생성해주세요.</textarea>
                    </div>
                </div>
            </div>

            <div id="page-history" class="page-section hidden h-full flex flex-col">
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm flex-1 flex flex-col overflow-hidden">
                    <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                        <div class="text-sm font-bold text-gray-700">전체 생성 기록 데이터</div>
                        <button onclick="loadHistoryTable()" class="bg-white border border-gray-300 text-gray-700 px-3 py-1.5 rounded text-xs hover:bg-gray-100 font-bold">
                            <i class="fa-solid fa-rotate-right mr-1"></i>새로고침
                        </button>
                    </div>
                    
                    <div class="flex-1 overflow-auto p-0">
                        <table class="w-full text-left text-sm text-gray-600 border-collapse">
                            <thead class="bg-gray-100 text-gray-700 sticky top-0 shadow-sm text-xs uppercase">
                                <tr>
                                    <th class="px-6 py-3 font-bold border-b border-gray-200">생성일자</th>
                                    <th class="px-6 py-3 font-bold border-b border-gray-200">ISBN</th>
                                    <th class="px-6 py-3 font-bold border-b border-gray-200 w-1/3">도서명</th>
                                    <th class="px-6 py-3 font-bold border-b border-gray-200 text-center">생성된 채널</th>
                                    <th class="px-6 py-3 font-bold border-b border-gray-200 text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody" class="divide-y divide-gray-100">
                                <tr><td colspan="5" class="text-center py-8 text-gray-400">데이터를 불러오는 중입니다...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="page-settings" class="page-section hidden h-full">
                <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-8 max-w-md">
                    <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-3">관리자 암호 변경</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">현재 암호</label>
                            <input type="password" id="currentPw" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#00c6ff] focus:outline-none focus:ring-1 focus:ring-[#00c6ff]">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">새 암호</label>
                            <input type="password" id="newPw" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#00c6ff] focus:outline-none focus:ring-1 focus:ring-[#00c6ff]">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-600 mb-1">새 암호 확인</label>
                            <input type="password" id="newPwConfirm" class="w-full border border-gray-300 rounded px-3 py-2 text-sm focus:border-[#00c6ff] focus:outline-none focus:ring-1 focus:ring-[#00c6ff]">
                        </div>
                        <div class="pt-4">
                            <button onclick="changePassword()" class="w-full bg-[#2b303b] text-white px-4 py-2.5 rounded text-sm hover:bg-[#1f232b] font-bold shadow-sm">
                                암호 변경 적용
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        // 전역 변수
        let currentBook = null;
        let results = { smartstore: '', blog: '', cafe: '' };
        let activeTab = 'smartstore';

        // 1. 페이지 전환 로직 (SPA)
        function switchPage(pageId, element) {
            // 사이드바 메뉴 스타일 변경
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('menu-active'));
            element.classList.add('menu-active');

            // 섹션 숨기기/보이기
            document.querySelectorAll('.page-section').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');

            // 헤더 타이틀 변경 및 데이터 로드
            const titleEl = document.getElementById('pageTitle');
            if (pageId === 'generate') {
                titleEl.innerHTML = '스마트 도서 콘텐츠 생성';
            } else if (pageId === 'history') {
                titleEl.innerHTML = 'DB 기록 모니터링';
                loadHistoryTable(); // 히스토리 탭 클릭 시 테이블 새로 로드
            } else if (pageId === 'settings') {
                titleEl.innerHTML = '관리자 환경 설정';
            }
        }

        // 2. 도서 검색 기능
        async function fetchBook() {
            const isbn = document.getElementById('isbnInput').value.trim();
            if (!isbn) return alert("ISBN을 입력해주세요.");
            
            document.getElementById('contentResult').value = "도서 정보를 불러오는 중입니다...";
            
            const res = await fetch('/fetch_book', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({isbn})
            });
            const result = await res.json();
            
            if (result.success) {
                currentBook = result.data;
                currentBook.isbn = isbn;
                
                document.getElementById('bookDetail').classList.remove('hidden');
                document.getElementById('bookTitle').innerText = currentBook.title;
                document.getElementById('bookMeta').innerText = `${currentBook.author} | ${currentBook.publisher}`;
                
                results = { smartstore: '', blog: '', cafe: '' };
                document.getElementById('contentResult').value = "도서 확인 완료. 우측의 채널을 선택하고 생성 버튼을 누르세요.";
            } else {
                alert(result.message);
                document.getElementById('contentResult').value = "결과가 없습니다.";
            }
        }

        // 3. 콘텐츠 일괄 생성
        async function generateSelected() {
            if (!currentBook) return alert("먼저 도서정보를 불러오세요.");
            
            const targets = [];
            if(document.getElementById('chk_smartstore').checked) targets.push('smartstore');
            if(document.getElementById('chk_blog').checked) targets.push('blog');
            if(document.getElementById('chk_cafe').checked) targets.push('cafe');

            if(targets.length === 0) return alert("생성할 채널을 선택해주세요.");

            document.getElementById('contentResult').value = "AI가 콘텐츠를 작성 중입니다... (최대 1~2분 소요)";
            
            for (const target of targets) {
                try {
                    const res = await fetch('/generate', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({book_info: currentBook, target: target})
                    });
                    const result = await res.json();
                    results[target] = result.content;
                } catch (e) {
                    results[target] = "오류 발생";
                }
            }
            showTab(targets[0]);
            alert("생성이 완료되어 DB에 자동 저장되었습니다.");
        }

        // 4. 생성 결과 탭 전환
        function showTab(target) {
            activeTab = target;
            document.getElementById('contentResult').value = results[target] || "이 채널에 생성된 내용이 없습니다.";
            
            const tabs = ['smartstore', 'blog', 'cafe'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === target) {
                    el.className = `flex-1 py-3 text-sm font-bold border-b-2 border-[#00c6ff] text-[#00c6ff] bg-white`;
                } else {
                    el.className = `flex-1 py-3 text-sm font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-100`;
                }
            });
        }

        // 5. 복사 기능
        function copyContent() {
            const content = document.getElementById('contentResult').value;
            if (content && !content.includes("왼쪽에서") && !content.includes("이 채널에")) {
                navigator.clipboard.writeText(content).then(() => alert("복사되었습니다!")).catch(() => alert("직접 복사해주세요."));
            } else {
                alert("복사할 내용이 없습니다.");
            }
        }

        // 6. DB 모니터링 테이블 로드
        async function loadHistoryTable() {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">데이터 로딩 중...</td></tr>';
            
            try {
                const res = await fetch('/history_list');
                const result = await res.json();
                
                if (result.success && result.data.length > 0) {
                    tbody.innerHTML = result.data.map(item => `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-xs">${item.date}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-xs font-mono text-gray-500">${item.isbn}</td>
                            <td class="px-6 py-4 text-sm font-bold text-gray-800 line-clamp-1 truncate max-w-[200px]">${item.title}</td>
                            <td class="px-6 py-4 text-center">
                                ${formatTargets(item.targets)}
                            </td>
                            <td class="px-6 py-4 text-center">
                                <button onclick="loadFromHistory('${item.isbn}')" class="text-[#00c6ff] border border-[#00c6ff] hover:bg-[#e6f9ff] px-3 py-1 rounded text-xs font-bold transition">불러오기</button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-gray-400">저장된 데이터가 없습니다.</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-400">오류가 발생했습니다.</td></tr>';
            }
        }

        // 채널 표시 뱃지 헬퍼
        function formatTargets(targetStr) {
            if(!targetStr) return '-';
            const map = {'smartstore': '스토어', 'blog': '블로그', 'cafe': '카페'};
            const arr = [...new Set(targetStr.split(','))];
            return arr.map(t => `<span class="inline-block bg-gray-100 border border-gray-200 text-gray-600 text-[10px] px-1.5 py-0.5 rounded mr-1">${map[t]||t}</span>`).join('');
        }

        // 모니터링 테이블에서 '불러오기' 클릭 시 생성 페이지로 이동하여 데이터 렌더링
        async function loadFromHistory(isbn) {
            // 사이드바 탭 전환
            const generateTab = document.querySelector('a[onclick*="generate"]');
            switchPage('generate', generateTab);

            document.getElementById('isbnInput').value = isbn;
            document.getElementById('contentResult').value = "DB에서 기록을 불러오는 중입니다...";

            const res = await fetch(`/search_history?isbn=${isbn}`);
            const result = await res.json();

            if (result.success) {
                results = { smartstore: '', blog: '', cafe: '' };
                Object.assign(results, result.data);
                
                document.getElementById('bookDetail').classList.remove('hidden');
                document.getElementById('bookTitle').innerText = "DB 기존 작업 도서";
                document.getElementById('bookMeta').innerText = `ISBN: ${isbn}`;
                currentBook = { isbn: isbn };

                showTab(activeTab);
            }
        }

        // 7. 암호 변경 
        async function changePassword() {
            const currentPw = document.getElementById('currentPw').value;
            const newPw = document.getElementById('newPw').value;
            const newPwConfirm = document.getElementById('newPwConfirm').value;

            if(!currentPw || !newPw) return alert("비밀번호를 모두 입력해주세요.");
            if(newPw !== newPwConfirm) return alert("새 비밀번호가 일치하지 않습니다.");

            const res = await fetch('/change_password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ current_pw: currentPw, new_pw: newPw })
            });
            const result = await res.json();
            
            alert(result.message);
            if(result.success) {
                document.getElementById('currentPw').value = '';
                document.getElementById('newPw').value = '';
                document.getElementById('newPwConfirm').value = '';
            }
        }
    </script>
</body>
</html>
