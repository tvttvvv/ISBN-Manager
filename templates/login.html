<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 도서 툴킷</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link href="[https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap](https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;800&display=swap)" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #2b303b; }
    </style>
</head>
<body class="h-screen flex items-center justify-center antialiased">
    <div class="bg-white p-10 rounded-xl shadow-2xl w-full max-w-[400px]">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold text-gray-800">도서콘텐츠 관리자</h1>
            <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 text-red-500 px-4 py-3 rounded-lg mb-6 text-sm text-center font-bold border border-red-200">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 uppercase tracking-wider">아이디</label>
                <input class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 px-4 text-gray-800 focus:bg-white focus:border-[#00c6ff] focus:ring-2 focus:ring-blue-100 transition-all duration-200 outline-none" id="username" name="username" type="text" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1 uppercase tracking-wider">비밀번호</label>
                <input class="w-full bg-gray-50 border border-gray-200 rounded-lg py-3 px-4 text-gray-800 focus:bg-white focus:border-[#00c6ff] focus:ring-2 focus:ring-blue-100 transition-all duration-200 outline-none" id="password" name="password" type="password" required>
            </div>
            <div class="pt-2">
                <button class="w-full bg-[#2b303b] hover:bg-[#1f232b] text-white font-bold py-3.5 px-4 rounded-lg transition-all duration-200 shadow-md" type="submit">
                    로그인
                </button>
            </div>
        </form>
    </div>
</body>
</html>
