<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 도서 툴킷</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; }
        .input-field {
            width: 100%;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            color: #0f172a;
            font-size: 14px;
            transition: all 0.2s;
            outline: none;
        }
        .input-field:focus {
            background: #fff;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-weight: 700;
            padding: 13px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s;
            letter-spacing: 0.02em;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #4f46e5, #4338ca);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        .btn-primary:active { transform: translateY(0); }
        .grid-bg {
            background-image: linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-slate-50 grid-bg antialiased">

    <div class="w-full max-w-[400px] px-4">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/80 border border-slate-100 p-10">

            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-50 rounded-2xl mb-4">
                    <i class="fa-solid fa-book-open text-indigo-600 text-xl"></i>
                </div>
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight">도서콘텐츠 관리자</h1>
                <p class="text-slate-400 text-sm mt-1">Admin Dashboard</p>
            </div>

            {% if error %}
            <div class="flex items-center gap-2 bg-red-50 text-red-600 px-4 py-3 rounded-xl mb-6 text-sm font-medium border border-red-100">
                <i class="fa-solid fa-circle-exclamation text-red-400"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">아이디</label>
                    <input class="input-field" id="username" name="username" type="text" placeholder="관리자 아이디" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">비밀번호</label>
                    <input class="input-field" id="password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <div class="pt-2">
                    <button class="btn-primary" type="submit">
                        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>로그인
                    </button>
                </div>
            </form>
        </div>

        <p class="text-center text-slate-400 text-xs mt-5">도서 콘텐츠 통합 관리 시스템 &copy; 2025</p>
    </div>
</body>
</html>
